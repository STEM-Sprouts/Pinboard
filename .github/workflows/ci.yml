name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Lint
        run: npx eslint src e2e scripts
      - name: Unit & runtime tests (Phase-0 gate + lowering + persistence)
        run: npx vitest run
